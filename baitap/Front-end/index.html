<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
<style>
    body {
        margin: 0;
        font-family: Arial, sans-serif;
        background: linear-gradient(135deg, #e0f2fe, #f8fafc);
        color: #1f2937;
    }

    h1 {
        text-align: center;
        padding: 20px 10px;
        margin: 0;
        background: #0f172a;
        color: white;
        box-shadow: 0 4px 10px rgba(0, 0, 0, 0.15);
    }

    #products {
        max-width: 900px;
        margin: 30px auto;
        padding: 20px;
        background: rgba(255, 255, 255, 0.85);
        border-radius: 16px;
        box-shadow: 0 8px 30px rgba(0, 0, 0, 0.12);
    }

    #products h3 {
        margin-top: 0;
        margin-bottom: 12px;
        font-size: 24px;
        color: #2563eb;
        border-left: 5px solid #2563eb;
        padding-left: 10px;
    }

    #products p {
        margin: 6px 0;
        font-size: 16px;
        line-height: 1.5;
    }

    #products hr {
        border: none;
        height: 1px;
        background: #d1d5db;
        margin: 18px 0;
    }
</style>
</head>
<body>
    <div id="products"></div>

    <script src="./app.js"></script>
</body>
</html>
