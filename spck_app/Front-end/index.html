<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Document</title>
</head>
<body>
    <div class="container">
        <h1>🎮 Game Collection Manager 🎮</h1>
        <input type="text" id="name" placeholder="Game Name">
        <input type="text" id="genre" placeholder="Genre">
        <input type="number" id="hours" placeholder="Hours Played">
        <input type="text" id="status" placeholder="Status">
        <button id="addGameBtn">Add Game➕</button>
        <hr>
        <h2>My Games</h2>
        <input type="text" id="search" placeholder="Search game..."> <button onclick="searchGame()">Search</button>
        <div id="gameList"></div>
        <h2>Statistics📊</h2>
        <p id="totalGames"></p>
        <p id="playingGames"></p>
        <p id="completedGames"></p>
    </div>
    <script src="app.js"></script>
</body>
</html>
